<!doctype html>
<html lang="vi">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Bài học | Tueban</title>
  <meta name="description" content="Chi tiết bài học Tueban" />
  <link rel="stylesheet" href="/assets/app.css" />
</head>
<body>
  <main class="page-shell">
    <header class="page-header">
      <a class="back-link" href="/courses.html">← Quay lại khóa học</a>
      <div class="status" id="lesson-slug">slug</div>
      <h1 id="lesson-title">Đang tải bài học...</h1>
      <p id="lesson-course" class="muted">Đang tải course/topic...</p>
      <p id="lesson-meta" class="muted">Đang tải meta...</p>
    </header>

    <section class="two-col">
      <article class="card lesson-content">
        <div id="lesson-body">Đang tải nội dung...</div>
      </article>

      <aside class="stack">
        <section>
          <h2>Tài liệu đính kèm</h2>
          <div id="lesson-assets" class="stack">
            <div class="card">Đang tải tài liệu...</div>
          </div>
        </section>

        <section>
          <h2>Hành động</h2>
          <div class="card stack">
            <button id="complete-lesson-btn" class="btn" type="button" disabled>
              Hoàn thành bài học
            </button>
            <pre id="lesson-complete-result" class="output">Chưa thực hiện.</pre>
          </div>
        </section>

        <section>
          <h2>Progress học viên mẫu</h2>
          <div id="progress-summary"></div>
          <pre id="progress-output" class="output">Đang chờ dữ liệu...</pre>
        </section>
      </aside>
    </section>

    <section class="debug-panel">
      <h2>Lesson API Output</h2>
      <pre id="lesson-output" class="output">Đang chờ dữ liệu...</pre>
    </section>
  </main>

  <script src="/assets/app.js"></script>
</body>
</html>
